<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Research Plan Execute Verify</title>
  <desc id="desc">A four step circular learning workflow for Agentic Vibe Working.</desc>
  <defs>
    <linearGradient id="ring" x1="80" x2="440" y1="80" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2f6f5e"/>
      <stop offset=".52" stop-color="#315d87"/>
      <stop offset="1" stop-color="#c85f4a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17211f" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="520" height="520" rx="36" fill="#fffdf8"/>
  <circle cx="260" cy="260" r="176" fill="none" stroke="#d9e1dc" stroke-width="34"/>
  <path d="M260 84a176 176 0 0 1 176 176" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="34"/>
  <path d="M436 260a176 176 0 0 1-176 176" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="34" opacity=".86"/>
  <path d="M260 436A176 176 0 0 1 84 260" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="34" opacity=".72"/>
  <path d="M84 260A176 176 0 0 1 260 84" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="34" opacity=".58"/>
  <g filter="url(#softShadow)">
    <circle cx="260" cy="260" r="92" fill="#17211f"/>
    <text x="260" y="246" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#fffdf8">Agentic</text>
    <text x="260" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#fffdf8">Workflow</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="#17211f">
    <text x="260" y="61" text-anchor="middle">Research</text>
    <text x="462" y="268" text-anchor="middle">Plan</text>
    <text x="260" y="482" text-anchor="middle">Execute</text>
    <text x="58" y="268" text-anchor="middle">Verify</text>
  </g>
  <g fill="#fffdf8" stroke="#17211f" stroke-width="8">
    <circle cx="260" cy="84" r="13"/>
    <circle cx="436" cy="260" r="13"/>
    <circle cx="260" cy="436" r="13"/>
    <circle cx="84" cy="260" r="13"/>
  </g>
</svg>
